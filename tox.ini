[tox]
envlist = py3

[testenv]
deps =
    -r{toxinidir}/requirements.txt
commands =
    pytest -v \
        test_outfox.py \
        test_mixnet.py \
        test_scherer2023_fixes.py \
        test_ta_claims.py \
        test_por_expert_route.py \
        test_por_directory_expert_mode.py \
        test_por_memory_index.py \
        test_por_peer_address.py \
        test_por_udp_demo.py \
        sphinxmix/OutfoxParams.py
    python scripts/check_ta_claims.py
